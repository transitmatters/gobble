x-agency-base: &agency-base
  build:
    context: .
    dockerfile: Containerfile
  environment:
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_DEFAULT_REGION
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-s3-upload-base: &s3-upload-base
  build:
    context: .
    dockerfile: Containerfile
  entrypoint: >
    sh -c 'while true; do
      sleep $(( 3600 - $(date +%s) % 3600 ));
      uv run python3 src/s3_upload.py;
    done'
  environment:
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_DEFAULT_REGION

services:
  mwrta:
    <<: *agency-base
    profiles: [ma, massachusetts]
    volumes:
      - ./config/local.json:/app/config/local.json:ro
      - ./data/mwrta:/app/data

  gptd:
