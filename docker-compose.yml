services:
  mwrta:
    build:
      context: .
      dockerfile: Containerfile
    volumes:
      - ./config/local.json:/app/config/local.json:ro
      - ./data:/app/data
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
    extra_hosts:
      - "host.docker.internal:host-gateway"

  s3-upload:
    build:
      context: .
      dockerfile: Containerfile
    entrypoint: >
      sh -c 'while true; do
        sleep $(( 3600 - $(date +%s) % 3600 ));
        uv run python3 src/s3_upload.py;
      done'
    volumes:
      - ./config/local.json:/app/config/local.json:ro
      - ./data:/app/data
      - ~/.aws:/root/.aws:ro
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
